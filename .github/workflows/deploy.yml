# ========================================
# GitHub Actions Deployment Workflow
# Automatically deploys to GitHub Pages on push to main branch
# ========================================

name: Deploy Portfolio to GitHub Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main", "master"]
  
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies (if any)
        run: |
          if [ -f package.json ]; then
            npm ci --omit=dev || npm install --omit=dev
            echo "✅ Dependencies installed successfully"
          else
            echo "⚠️ No package.json found - skipping dependency installation"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Validate HTML (optional)
        run: |
          echo "🔍 Skipping HTML validation - no validator installed"
          # npm install -g html5validator
          # html5validator --root . --ignore "Element “img” is missing required attribute “src”" --skip-non-html

      - name: Check for broken links (optional)
        run: |
          echo "🔍 Skipping link checking - no linkinator installed"
          # npm install -g linkinator
          # linkinator ./ --skip "mailto:*" --skip "tel:*" --skip "https://www.google.com" --skip "https://fonts.googleapis.com" --skip "https://unpkg.com" --skip "https://cdnjs.cloudflare.com" --recurse

      - name: Optimize Images (optional)
        run: |
          echo "🖼️ Skipping image optimization - tools not installed"
          # sudo apt-get install -y jpegoptim optipng
          # find ./assets/images -name "*.jpg" -o -name "*.jpeg" | xargs -r jpegoptim --strip-all --max=85
          # find ./assets/images -name "*.png" | xargs -r optipng -o7

      - name: Generate Sitemap
        run: |
          echo "📊 Generating sitemap..."
          # Create sitemap.xml
          find . -name "*.html" -not -path "./node_modules/*" -not -path "./.git/*" | sed 's|^\./|https://joelkaudzu9-ship-it.github.io/|' > sitemap.txt
          echo '<?xml version="1.0" encoding="UTF-8"?>' > sitemap.xml
          echo '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">' >> sitemap.xml
          while read url; do
            echo "  <url><loc>$url</loc></url>" >> sitemap.xml
          done < sitemap.txt
          echo '</urlset>' >> sitemap.xml
          echo "✅ Sitemap generated"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
