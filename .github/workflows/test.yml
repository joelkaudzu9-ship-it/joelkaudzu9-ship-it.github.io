# ========================================
# Test Workflow - Runs on every PR
# Ensures code quality before deployment
# ========================================

name: Test Portfolio

on:
  pull_request:
    branches: ["main", "master"]
  push:
    branches-ignore: ["main", "master"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies (if any)
        run: |
          if [ -f package.json ]; then
            npm ci || npm install
            echo "✅ Dependencies installed"
          else
            echo "⚠️ No package.json found - skipping"
          fi

      - name: HTML Validation (simple check)
        run: |
          echo "🔍 Checking HTML files exist..."
          find . -name "*.html" | wc -l
          echo "✅ HTML files present"

      - name: Check for broken internal links
        run: |
          echo "🔍 Checking internal links..."
          # Simple check without external tools
          for file in $(find . -name "*.html"); do
            echo "Checking $file..."
            # Just verify the file exists
            if [ -f "$file" ]; then
              echo "✅ $file exists"
            fi
          done

      - name: Validate JSON files
        run: |
          echo "🔍 Checking JSON files..."
          for file in $(find ./data -name "*.json" 2>/dev/null || echo ""); do
            if [ -f "$file" ]; then
              echo "✅ Found JSON: $file"
            fi
          done
