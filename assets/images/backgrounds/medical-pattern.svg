<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
    <defs>
        <!-- Medical cross pattern -->
        <pattern id="medicalCross" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
            <path d="M10 5 L10 15 M5 10 L15 10" stroke="#D4AF37" stroke-width="0.8" opacity="0.15" stroke-linecap="round"/>
        </pattern>

        <!-- DNA helix pattern -->
        <pattern id="dnaPattern" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
            <path d="M5 5 Q15 10, 25 5 M5 15 Q15 20, 25 15 M5 25 Q15 30, 25 25" stroke="#22D3EE" stroke-width="0.6" opacity="0.1" fill="none"/>
            <path d="M10 5 Q15 10, 20 15 M10 15 Q15 20, 20 25" stroke="#D4AF37" stroke-width="0.6" opacity="0.1" fill="none"/>
        </pattern>

        <!-- Stethoscope outline pattern -->
        <pattern id="stethoscopePattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
            <circle cx="15" cy="15" r="5" stroke="#D4AF37" stroke-width="0.8" opacity="0.1" fill="none"/>
            <path d="M20 15 L30 15 L35 20" stroke="#22D3EE" stroke-width="0.8" opacity="0.1" fill="none"/>
        </pattern>

        <!-- Gradient backgrounds -->
        <linearGradient id="medicalGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0B1120" stop-opacity="1"/>
            <stop offset="50%" stop-color="#111827" stop-opacity="0.95"/>
            <stop offset="100%" stop-color="#0B1120" stop-opacity="1"/>
        </linearGradient>

        <radialGradient id="spotlightGradient">
            <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.1"/>
            <stop offset="70%" stop-color="#22D3EE" stop-opacity="0.05"/>
            <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
        </radialGradient>
    </defs>

    <!-- Base layer with gradient -->
    <rect width="100" height="100" fill="url(#medicalGradient)"/>

    <!-- Pattern overlays -->
    <rect width="100" height="100" fill="url(#medicalCross)"/>
    <rect width="100" height="100" fill="url(#dnaPattern)"/>
    <rect width="100" height="100" fill="url(#stethoscopePattern)"/>

    <!-- Accent spots -->
    <circle cx="20" cy="20" r="15" fill="url(#spotlightGradient)"/>
    <circle cx="80" cy="80" r="20" fill="url(#spotlightGradient)"/>
</svg>