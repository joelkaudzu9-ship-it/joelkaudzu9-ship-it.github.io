<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
    <defs>
        <style>
            .circuit-line {
                stroke: #D4AF37;
                stroke-width: 1;
                opacity: 0.08;
                fill: none;
            }
            .circuit-node {
                fill: #22D3EE;
                opacity: 0.1;
            }
            .circuit-path {
                stroke: #22D3EE;
                stroke-width: 0.8;
                opacity: 0.06;
                fill: none;
            }
        </style>
    </defs>

    <!-- Main circuit paths -->
    <g>
        <!-- Horizontal buses -->
        <path class="circuit-line" d="M200 200 L1720 200"/>
        <path class="circuit-line" d="M300 400 L1620 400"/>
        <path class="circuit-line" d="M400 600 L1520 600"/>
        <path class="circuit-line" d="M500 800 L1420 800"/>

        <!-- Vertical connections -->
        <path class="circuit-path" d="M600 200 L600 800"/>
        <path class="circuit-path" d="M900 200 L900 800"/>
        <path class="circuit-path" d="M1200 200 L1200 800"/>

        <!-- Diagonal traces -->
        <path class="circuit-line" d="M200 200 L400 400"/>
        <path class="circuit-line" d="M1720 200 L1520 400"/>
        <path class="circuit-line" d="M200 800 L400 600"/>
        <path class="circuit-line" d="M1720 800 L1520 600"/>

        <!-- Connection nodes -->
        <circle class="circuit-node" cx="200" cy="200" r="4"/>
        <circle class="circuit-node" cx="1720" cy="200" r="4"/>
        <circle class="circuit-node" cx="200" cy="800" r="4"/>
        <circle class="circuit-node" cx="1720" cy="800" r="4"/>
        <circle class="circuit-node" cx="600" cy="400" r="3"/>
        <circle class="circuit-node" cx="900" cy="600" r="3"/>
        <circle class="circuit-node" cx="1200" cy="300" r="3"/>
        <circle class="circuit-node" cx="1500" cy="700" r="3"/>
    </g>

    <!-- Integrated circuit chips -->
    <rect x="700" y="450" width="100" height="60" rx="5" fill="#D4AF37" opacity="0.05"/>
    <rect x="1100" y="250" width="80" height="50" rx="4" fill="#22D3EE" opacity="0.05"/>

    <!-- Data flow indicators -->
    <path d="M300 300 L350 350 L400 300" stroke="#D4AF37" stroke-width="1.5" opacity="0.1" fill="none"/>
    <path d="M1500 500 L1550 550 L1600 500" stroke="#22D3EE" stroke-width="1.5" opacity="0.1" fill="none"/>
</svg>