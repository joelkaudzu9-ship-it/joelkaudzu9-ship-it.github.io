<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
    <defs>
        <style>
            .medical-cross {
                stroke: #D4AF37;
                stroke-width: 2;
                opacity: 0.06;
                fill: none;
            }
            .medical-cross-small {
                stroke: #22D3EE;
                stroke-width: 1;
                opacity: 0.04;
                fill: none;
            }
        </style>

        <!-- Cross pattern definition -->
        <symbol id="cross" viewBox="0 0 20 20">
            <path d="M10 3 L10 17 M3 10 L17 10" stroke="currentColor" stroke-width="2"/>
        </symbol>
    </defs>

    <!-- Large crosses -->
    <g class="medical-cross">
        <use href="#cross" x="300" y="200" width="40" height="40"/>
        <use href="#cross" x="1500" y="800" width="60" height="60"/>
        <use href="#cross" x="800" y="600" width="50" height="50"/>
    </g>

    <!-- Medium crosses -->
    <g class="medical-cross-small">
        <use href="#cross" x="200" y="500" width="25" height="25"/>
        <use href="#cross" x="1200" y="300" width="30" height="30"/>
        <use href="#cross" x="1600" y="400" width="25" height="25"/>
        <use href="#cross" x="400" y="700" width="30" height="30"/>
        <use href="#cross" x="1000" y="900" width="25" height="25"/>
    </g>

    <!-- Small crosses (scattered) -->
    <g class="medical-cross-small" opacity="0.03">
        <use href="#cross" x="100" y="150" width="15" height="15"/>
        <use href="#cross" x="1800" y="250" width="15" height="15"/>
        <use href="#cross" x="600" y="350" width="12" height="12"/>
        <use href="#cross" x="1400" y="550" width="15" height="15"/>
        <use href="#cross" x="350" y="850" width="12" height="12"/>
        <use href="#cross" x="750" y="150" width="15" height="15"/>
        <use href="#cross" x="1650" y="650" width="12" height="12"/>
    </g>

    <!-- Floating cross animation (for overlay) -->
    <g opacity="0.02">
        <use href="#cross" x="500" y="400" width="20" height="20">
            <animate attributeName="y" values="400;380;400" dur="7s" repeatCount="indefinite"/>
        </use>
        <use href="#cross" x="1300" y="700" width="20" height="20">
            <animate attributeName="x" values="1300;1280;1300" dur="9s" repeatCount="indefinite"/>
        </use>
    </g>
</svg>