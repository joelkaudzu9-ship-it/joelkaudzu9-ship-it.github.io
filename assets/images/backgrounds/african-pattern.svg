<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
    <defs>
        <!-- Traditional African pattern elements -->
        <pattern id="zigzagPattern" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
            <path d="M0 15 L10 5 L20 15 L30 5" stroke="#D4AF37" stroke-width="1.2" opacity="0.12" fill="none"/>
            <path d="M0 25 L10 15 L20 25 L30 15" stroke="#22D3EE" stroke-width="1.2" opacity="0.12" fill="none"/>
        </pattern>

        <pattern id="diamondPattern" x="0" y="0" width="25" height="25" patternUnits="userSpaceOnUse">
            <path d="M12.5 0 L25 12.5 L12.5 25 L0 12.5 Z" stroke="#D4AF37" stroke-width="0.8" opacity="0.1" fill="none"/>
            <circle cx="12.5" cy="12.5" r="3" fill="#22D3EE" opacity="0.1"/>
        </pattern>

        <pattern id="tribalPattern" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
            <!-- Tribal shapes -->
            <path d="M10 10 C5 15, 5 25, 10 30 C15 35, 25 35, 30 30 C35 25, 35 15, 30 10 C25 5, 15 5, 10 10" stroke="#D4AF37" stroke-width="1" opacity="0.08" fill="none"/>
            <path d="M15 15 L25 25 M25 15 L15 25" stroke="#22D3EE" stroke-width="0.8" opacity="0.08"/>
        </pattern>

        <pattern id="dotsPattern" x="0" y="0" width="15" height="15" patternUnits="userSpaceOnUse">
            <circle cx="4" cy="4" r="1.5" fill="#D4AF37" opacity="0.1"/>
            <circle cx="11" cy="11" r="1.5" fill="#22D3EE" opacity="0.1"/>
            <circle cx="11" cy="4" r="1" fill="#D4AF37" opacity="0.1"/>
            <circle cx="4" cy="11" r="1" fill="#22D3EE" opacity="0.1"/>
        </pattern>

        <!-- Continent silhouette pattern -->
        <pattern id="africaSilhouette" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
            <path d="M25 10 L30 15 L28 20 L32 25 L28 30 L25 35 L20 32 L15 30 L12 25 L15 20 L18 15 L22 12 L25 10" fill="none" stroke="#D4AF37" stroke-width="1" opacity="0.15"/>
        </pattern>

        <!-- Gradient backgrounds -->
        <linearGradient id="africanGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0B1120" stop-opacity="1"/>
            <stop offset="30%" stop-color="#1a1f2e" stop-opacity="0.98"/>
            <stop offset="70%" stop-color="#1a1f2e" stop-opacity="0.98"/>
            <stop offset="100%" stop-color="#0B1120" stop-opacity="1"/>
        </linearGradient>

        <radialGradient id="sunGradient">
            <stop offset="0%" stop-color="#D4AF37" stop-opacity="0.12"/>
            <stop offset="50%" stop-color="#22D3EE" stop-opacity="0.06"/>
            <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
        </radialGradient>
    </defs>

    <!-- Base layer -->
    <rect width="100" height="100" fill="url(#africanGradient)"/>

    <!-- Pattern overlays (layered for depth) -->
    <rect width="100" height="100" fill="url(#zigzagPattern)"/>
    <rect width="100" height="100" fill="url(#diamondPattern)"/>
    <rect width="100" height="100" fill="url(#tribalPattern)"/>
    <rect width="100" height="100" fill="url(#dotsPattern)"/>
    <rect width="100" height="100" fill="url(#africaSilhouette)"/>

    <!-- Sun/heat effect -->
    <circle cx="20" cy="30" r="25" fill="url(#sunGradient)"/>
    <circle cx="80" cy="70" r="35" fill="url(#sunGradient)"/>

    <!-- Horizon line suggestion -->
    <path d="M0 70 Q50 65, 100 70" stroke="#D4AF37" stroke-width="1.5" opacity="0.1" fill="none"/>

    <!-- Scattered dots representing stars/cities -->
    <circle cx="45" cy="20" r="0.8" fill="#D4AF37" opacity="0.2"/>
    <circle cx="55" cy="25" r="0.8" fill="#22D3EE" opacity="0.2"/>
    <circle cx="65" cy="18" r="0.8" fill="#D4AF37" opacity="0.2"/>
    <circle cx="75" cy="30" r="0.8" fill="#22D3EE" opacity="0.2"/>
    <circle cx="85" cy="22" r="0.8" fill="#D4AF37" opacity="0.2"/>
</svg>